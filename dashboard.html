<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VoltSense | Live Meter</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:Arial;
background:linear-gradient(135deg,#06132e,#0d2d62,#1a5fb4);
color:white;
min-height:100vh;
}

/* HEADER */
header{
background:white;
padding:15px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:22px;
font-weight:bold;
color:#1a5fb4;
text-decoration:none;
}

nav a{
margin-left:18px;
text-decoration:none;
color:#333;
font-weight:bold;
}

nav .active{color:#1a5fb4;}

/* CONTAINER */
.container{
width:92%;
max-width:1200px;
margin:auto;
padding:25px 0;
}

h2{text-align:center;margin-bottom:10px;}

/* 🔥 TOP BAR */
.top-bar{
display:flex;
justify-content:center;
gap:25px;
font-size:18px;
color:#dce8ff;
margin-bottom:20px;
flex-wrap:wrap;
}

#tariff{
background:rgba(255,255,255,0.1);
padding:5px 12px;
border-radius:8px;
font-size:14px;
}

/* STATUS */
.status{
text-align:center;
font-size:14px;
margin-bottom:20px;
color:#90ee90;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:18px;
}

@media(max-width:900px){
.grid{grid-template-columns:repeat(2,1fr);}
}

@media(max-width:500px){
.grid{grid-template-columns:1fr;}
}

/* CARD */
.card{
background:rgba(255,255,255,0.08);
padding:22px;
border-radius:18px;
text-align:center;
box-shadow:0 10px 20px rgba(0,0,0,.15);
}

.title{
font-size:16px;
margin-bottom:12px;
color:#dce8ff;
}

.val{
font-size:28px;
font-weight:bold;
}

/* RELAY BUTTON */
button{
margin-top:10px;
padding:8px 14px;
border:none;
border-radius:8px;
background:#1a5fb4;
color:white;
cursor:pointer;
}

/* 🔥 HIGHLIGHT SUMMARY */
.highlight{
grid-column:span 3;
}

.units{
background:linear-gradient(135deg,#1a5fb4,#4da3ff);
}

.bill{
background:linear-gradient(135deg,#0f9d58,#34d399);
}

.highlight .val{
font-size:36px;
}

/* RESPONSIVE FOR SUMMARY */
@media(max-width:900px){
.highlight{grid-column:span 2;}
}

@media(max-width:500px){
.highlight{grid-column:span 1;}
}
</style>
</head>

<body>

<header>
<a href="#" class="logo">⚡ VoltSense</a>

<nav>
<a href="index.html">Home</a>
<a href="auth.html">Login</a>
<a href="dashboard.html" class="active">Dashboard</a>
<a href="utility.html">Utility</a>
</nav>
</header>

<div class="container">

<h2>⚡ Live Meter Monitor</h2>

<!-- 🔥 TIME + TARIFF -->
<div class="top-bar">
  <span id="clock">--</span>
  <span id="tariff">₹--/unit</span>
</div>

<div class="status" id="status">Connecting...</div>

<div class="grid">

<div class="card"><div class="title">Voltage</div><div class="val" id="voltage">--</div></div>
<div class="card"><div class="title">Current</div><div class="val" id="current">--</div></div>
<div class="card"><div class="title">Power</div><div class="val" id="power">--</div></div>

<div class="card"><div class="title">Energy</div><div class="val" id="energy">--</div></div>
<div class="card"><div class="title">Live Cost</div><div class="val" id="cost">--</div></div>

<div class="card">
<div class="title">Relay</div>
<div class="val" id="relay">--</div>
<button onclick="toggleRelay()">Toggle</button>
</div>

<!-- 🔥 FINAL SUMMARY AT END -->
<div class="card highlight units">
<div class="title">Total Units Consumed</div>
<div class="val" id="totalUnits">--</div>
</div>

<div class="card highlight bill">
<div class="title">Total Bill Amount</div>
<div class="val" id="totalAmount">--</div>
</div>

</div>
</div>

<script>
// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyBxSwZqGENQ6rCYbx-ip0G9odmkCi6XTFc",
  authDomain: "voultsense.firebaseapp.com",
  databaseURL: "https://voultsense-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "voultsense"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 🕒 CLOCK
setInterval(()=>{
    const now = new Date();
    document.getElementById("clock").innerText =
    now.toLocaleDateString() + " | " + now.toLocaleTimeString();
},1000);

// 📡 LIVE DATA
db.ref("1_energy_monitor").on("value",(snap)=>{
    let d = snap.val();

    if(!d){
        document.getElementById("status").innerText = "No Data ❌";
        return;
    }

    document.getElementById("status").innerText = "Connected ✅";

    document.getElementById("voltage").innerText = (d.voltage_V ?? 0).toFixed(1) + " V";
    document.getElementById("current").innerText = (d.current_A ?? 0).toFixed(2) + " A";
    document.getElementById("power").innerText   = (d.power_W ?? 0).toFixed(1) + " W";
    document.getElementById("energy").innerText  = (d.energy_kWh ?? 0).toFixed(3) + " kWh";
    document.getElementById("cost").innerText    = "₹" + (d.bill_INR ?? 0).toFixed(2);

    const relayState = Number(d.relay) === 1 ? "ON" : "OFF";
    document.getElementById("relay").innerText = relayState;

    document.getElementById("totalUnits").innerText =
        (d.energy_kWh ?? 0).toFixed(3) + " kWh";

    document.getElementById("totalAmount").innerText =
        "₹" + (d.bill_INR ?? 0).toFixed(2);
});

// 💰 TARIFF
db.ref("settings/tariff").on("value",(snap)=>{
    let t = snap.val() ?? 7.2;
    document.getElementById("tariff").innerText = "₹" + t + "/unit";
});

// 🔌 RELAY CONTROL
function toggleRelay(){
    db.ref("relay").once("value").then((snap)=>{
        let current = snap.val() ?? 1;
        db.ref("relay").set(current === 1 ? 0 : 1);
    });
}
</script>

</body>
</html>
